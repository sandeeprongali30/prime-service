name: CI/CD Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        run: |
          mkdir -p ~/.aws
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials

          echo "[default]" > ~/.aws/config
          echo "region=${{ secrets.AWS_REGION }}" >> ~/.aws/config

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get VPN endpoint
        working-directory: terraform/environments/dev
        run: |
          echo "VPN_ENDPOINT=$(terraform output -raw vpn_endpoint)" >> $GITHUB_ENV

      - name: Wait for services
        run: sleep 60

      - name: Print VPN endpoint
        run: |
          echo "VPN Endpoint: $VPN_ENDPOINT"

      - name: Get Instance ID
        working-directory: terraform/environments/dev
        run: |
          echo "INSTANCE_ID=$(terraform output -raw instance_id)" >> $GITHUB_ENV

      - name: Fetch peer1.conf via SSM
        run: |
          echo "Fetching peer1.conf from EC2..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "CONTAINER=$(docker ps --format \"{{.Names}}\" | grep wireguard)",
                "docker exec $CONTAINER cat /config/peer1/peer1.conf"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          sleep 10

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id $INSTANCE_ID \
            --query "StandardOutputContent" \
            --output text > peer1.conf

          echo "peer1.conf fetched successfully"

      - name: Upload peer config
        uses: actions/upload-artifact@v4
        with:
          name: peer-config
          path: peer1.conf